<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0D0F14"/>

  <!-- Hex grid background -->
  <defs>
    <pattern id="hex" x="0" y="0" width="70" height="60" patternUnits="userSpaceOnUse">
      <polygon points="35,3 67,21 67,39 35,57 3,39 3,21" fill="none" stroke="#FF5C35" stroke-width="0.4" opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#hex)"/>

  <!-- Glow -->
  <ellipse cx="920" cy="315" rx="380" ry="320" fill="#FF5C35" opacity="0.07"/>

  <!-- Conquered hexagons cluster - left side of right half -->
  <g opacity="0.9">
    <!-- Row 1 -->
    <polygon points="720,180 755,160 790,180 790,220 755,240 720,220" fill="#FF5C35" opacity="0.85"/>
    <polygon points="790,180 825,160 860,180 860,220 825,240 790,220" fill="#FF5C35" opacity="0.70"/>
    <polygon points="860,180 895,160 930,180 930,220 895,240 860,220" fill="#FF5C35" opacity="0.55"/>
    <polygon points="930,180 965,160 1000,180 1000,220 965,240 930,220" fill="#4D8EFF" opacity="0.65"/>
    <polygon points="1000,180 1035,160 1070,180 1070,220 1035,240 1000,220" fill="#4D8EFF" opacity="0.50"/>

    <!-- Row 2 (offset) -->
    <polygon points="755,240 790,220 825,240 825,280 790,300 755,280" fill="#FF5C35" opacity="0.90"/>
    <polygon points="825,240 860,220 895,240 895,280 860,300 825,280" fill="#FF5C35" opacity="0.75"/>
    <polygon points="895,240 930,220 965,240 965,280 930,300 895,280" fill="#FF5C35" opacity="0.60"/>
    <polygon points="965,240 1000,220 1035,240 1035,280 1000,300 965,280" fill="#4D8EFF" opacity="0.70"/>
    <polygon points="1035,240 1070,220 1105,240 1105,280 1070,300 1035,280" fill="#4D8EFF" opacity="0.45"/>

    <!-- Row 3 -->
    <polygon points="720,300 755,280 790,300 790,340 755,360 720,340" fill="#FF5C35" opacity="0.80"/>
    <polygon points="790,300 825,280 860,300 860,340 825,360 790,340" fill="#FF5C35" opacity="0.95"/>
    <polygon points="860,300 895,280 930,300 930,340 895,360 860,340" fill="#FF5C35" opacity="0.70"/>
    <polygon points="930,300 965,280 1000,300 1000,340 965,360 930,340" fill="#FF5C35" opacity="0.50"/>
    <polygon points="1000,300 1035,280 1070,300 1070,340 1035,360 1000,340" fill="#4D8EFF" opacity="0.60"/>

    <!-- Row 4 (offset) -->
    <polygon points="755,360 790,340 825,360 825,400 790,420 755,400" fill="#FF5C35" opacity="0.65"/>
    <polygon points="825,360 860,340 895,360 895,400 860,420 825,400" fill="#FF5C35" opacity="0.85"/>
    <polygon points="895,360 930,340 965,360 965,400 930,420 895,400" fill="#FF5C35" opacity="0.75"/>
    <polygon points="965,360 1000,340 1035,360 1035,400 1000,420 965,400" fill="#FF5C35" opacity="0.45"/>
    <polygon points="1035,360 1070,340 1105,360 1105,400 1070,420 1035,400" fill="#1C2030" stroke="#FF5C35" stroke-width="1" opacity="0.8"/>

    <!-- Row 5 -->
    <polygon points="720,420 755,400 790,420 790,460 755,480 720,460" fill="#1C2030" stroke="#4D8EFF" stroke-width="1" opacity="0.8"/>
    <polygon points="790,420 825,400 860,420 860,460 825,480 790,460" fill="#FF5C35" opacity="0.55"/>
    <polygon points="860,420 895,400 930,420 930,460 895,480 860,460" fill="#FF5C35" opacity="0.80"/>
    <polygon points="930,420 965,400 1000,420 1000,460 965,480 930,460" fill="#4D8EFF" opacity="0.55"/>
    <polygon points="1000,420 1035,400 1070,420 1070,460 1035,480 1000,460" fill="#4D8EFF" opacity="0.40"/>
  </g>

  <!-- Left text content -->
  <!-- Eyebrow pill -->
  <rect x="80" y="120" width="260" height="34" rx="17" fill="#FF5C35" opacity="0.15"/>
  <rect x="80" y="120" width="260" height="34" rx="17" fill="none" stroke="#FF5C35" stroke-width="1" opacity="0.4"/>
  <circle cx="104" cy="137" r="5" fill="#FF5C35"/>
  <text x="118" y="142" font-family="'DM Sans', sans-serif" font-size="13" font-weight="500" fill="#FF5C35" letter-spacing="1">COPENHAGEN · LAUNCHING SOON</text>

  <!-- Main headline -->
  <text x="80" y="230" font-family="'Barlow Condensed', 'Arial Black', sans-serif" font-size="108" font-weight="900" fill="white" letter-spacing="-2">Conquer</text>
  <text x="80" y="340" font-family="'Barlow Condensed', 'Arial Black', sans-serif" font-size="108" font-weight="900" fill="#FF5C35" letter-spacing="-2">every</text>
  <text x="80" y="450" font-family="'Barlow Condensed', 'Arial Black', sans-serif" font-size="108" font-weight="900" fill="white" letter-spacing="-2">street.</text>

  <!-- Tagline -->
  <text x="80" y="510" font-family="'DM Sans', sans-serif" font-size="20" font-weight="300" fill="#8B93A8">Run. Conquer hexagons. Steal zones. Repeat.</text>

  <!-- Logo bottom left -->
  <rect x="78" y="548" width="44" height="44" rx="10" fill="#FF5C35"/>
  <text x="100" y="577" font-family="'Barlow Condensed', 'Arial Black', sans-serif" font-size="22" font-weight="900" fill="white" text-anchor="middle">R</text>
  <text x="134" y="577" font-family="'Barlow Condensed', 'Arial Black', sans-serif" font-size="28" font-weight="900" fill="white">rumbla</text>
  <circle cx="208" cy="565" r="5" fill="#FF5C35"/>
  <text x="222" y="577" font-family="'DM Sans', sans-serif" font-size="18" font-weight="300" fill="#4A5168">rumbla.app</text>

  <!-- Divider -->
  <line x1="80" y1="538" x2="640" y2="538" stroke="#1F2435" stroke-width="1"/>
</svg>
